<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kanban Manager</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f172a; color: #f1f5f9;
    width: 380px; min-height: 200px;
  }
  header {
    background: linear-gradient(135deg, #1e3a5f, #0f172a);
    padding: 0.75rem 1rem 0.65rem;
    border-bottom: 1px solid #334155;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 1rem; font-weight: 700; }
  header .subtitle { font-size: 0.65rem; color: #64748b; margin-top: 0.1rem; }
  .open-btn {
    background: #1d4ed8; color: #fff; border: none; border-radius: 6px;
    padding: 0.3rem 0.65rem; font-size: 0.72rem; cursor: pointer; white-space: nowrap;
  }
  .open-btn:hover { background: #2563eb; }

  /* No PAT */
  .setup-prompt { padding: 1.25rem 1rem; text-align: center; }
  .setup-prompt p { font-size: 0.82rem; color: #94a3b8; margin-bottom: 0.85rem; }
  .setup-btn { background: #1d4ed8; color: #fff; border: none; border-radius: 8px; padding: 0.6rem 1.25rem; font-size: 0.85rem; cursor: pointer; }

  /* Aggregate stats */
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.45rem; padding: 0.65rem 0.75rem 0; }
  .stat { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 0.5rem 0.7rem; }
  .stat .label { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin-bottom: 0.15rem; }
  .stat .value { font-size: 1.4rem; font-weight: 700; line-height: 1; }
  .stat .sub { font-size: 0.6rem; color: #64748b; margin-top: 0.1rem; }
  .c-triage { color: #6366f1; } .c-wip { color: #f59e0b; }
  .c-release { color: #10b981; } .c-aged { color: #ef4444; }

  /* Arrival rate */
  .arrival { margin: 0.55rem 0.75rem 0; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 0.55rem 0.8rem; }
  .arrival .label { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin-bottom: 0.35rem; }
  .arrival-row { display: flex; align-items: center; gap: 0.65rem; }
  .arrival-big { font-size: 1.5rem; font-weight: 700; color: #60a5fa; line-height: 1; }
  .arrival-detail { font-size: 0.67rem; color: #94a3b8; }
  .arrival-detail div { margin-bottom: 0.08rem; }
  .trend-up { color: #ef4444; } .trend-down { color: #22c55e; } .trend-same { color: #94a3b8; }

  /* Pod summary rows */
  .pods-section { padding: 0.55rem 0.75rem 0; }
  .pods-section .label { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin-bottom: 0.4rem; }
  .pod-row {
    display: flex; align-items: center; gap: 0.45rem;
    padding: 0.3rem 0; border-bottom: 1px solid #1e293b;
  }
  .pod-row:last-child { border-bottom: none; }
  .pod-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .pod-name { font-size: 0.73rem; flex: 1; font-weight: 600; color: #e2e8f0; }
  .pod-chips { display: flex; gap: 0.25rem; flex-wrap: wrap; justify-content: flex-end; }
  .chip { font-size: 0.58rem; padding: 0.08rem 0.35rem; border-radius: 4px; font-weight: 600; white-space: nowrap; }
  .chip-triage { background: rgba(99,102,241,.15); color: #a5b4fc; }
  .chip-wip    { background: rgba(245,158,11,.15); color: #fcd34d; }
  .chip-arr    { background: rgba(96,165,250,.15); color: #93c5fd; }
  .chip-aged   { background: rgba(239,68,68,.15);  color: #fca5a5; }

  .error-bar { margin: 0.45rem 0.75rem 0; background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); border-radius: 6px; padding: 0.35rem 0.55rem; font-size: 0.65rem; color: #fca5a5; display: none; }

  /* Footer */
  .footer { padding: 0.55rem 0.75rem 0.6rem; display: flex; align-items: center; justify-content: space-between; margin-top: 0.35rem; border-top: 1px solid #1e293b; }
  .last-updated { font-size: 0.62rem; color: #475569; }
  .refresh-btn { background: none; border: 1px solid #334155; color: #64748b; border-radius: 6px; padding: 0.22rem 0.55rem; font-size: 0.65rem; cursor: pointer; }
  .refresh-btn:hover { border-color: #3b82f6; color: #60a5fa; }
  .refresh-btn.spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <div>
    <h1>🗂 Kanban Manager</h1>
    <div class="subtitle">All Pods Overview</div>
  </div>
  <button class="open-btn" id="open-board-btn">Open Board →</button>
</header>

<div id="no-pat" class="setup-prompt" style="display:none">
  <p>No Azure DevOps PAT configured yet.<br>Set up your connection to get started.</p>
  <button class="setup-btn" id="configure-btn">Configure →</button>
</div>

<div id="main" style="display:none">
  <div class="stats">
    <div class="stat">
      <div class="label">Intake / Triage</div>
      <div class="value c-triage" id="s-triage">—</div>
      <div class="sub">all pods</div>
    </div>
    <div class="stat">
      <div class="label">WIP</div>
      <div class="value c-wip" id="s-wip">—</div>
      <div class="sub">in progress + review</div>
    </div>
    <div class="stat">
      <div class="label">Ready for Release</div>
      <div class="value c-release" id="s-release">—</div>
      <div class="sub">all pods</div>
    </div>
    <div class="stat">
      <div class="label">Aged &gt;90d</div>
      <div class="value c-aged" id="s-aged">—</div>
      <div class="sub">all pods</div>
    </div>
  </div>

  <div class="arrival">
    <div class="label">Arrival Rate — All pods this week</div>
    <div class="arrival-row">
      <div class="arrival-big" id="a-last7">—</div>
      <div class="arrival-detail">
        <div id="a-trend">vs prev week: —</div>
        <div id="a-last30">Last 30d: —</div>
        <div id="a-avg">Avg/week: —</div>
      </div>
    </div>
  </div>

  <div class="error-bar" id="error-bar"></div>

  <div class="pods-section">
    <div class="label">Pods</div>
    <div id="pod-list"></div>
  </div>
</div>

<div class="footer">
  <span class="last-updated" id="last-updated">—</span>
  <button class="refresh-btn" id="refresh-btn">↻ Refresh</button>
</div>

<script src="shared.js"></script>
<script src="popup.js"></script>
</body>
</html>
