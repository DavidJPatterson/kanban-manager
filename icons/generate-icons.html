<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<h2>Kanban Manager Icon Generator</h2>
<p>Right-click each canvas below and "Save image as" to save the PNG files into the icons/ folder.</p>
<div style="display:flex;gap:2rem;align-items:flex-end;flex-wrap:wrap">
  <div>
    <p>icon-16.png</p>
    <canvas id="c16" width="16" height="16" style="border:1px solid #ccc;image-rendering:pixelated;width:64px;height:64px"></canvas>
  </div>
  <div>
    <p>icon-48.png</p>
    <canvas id="c48" width="48" height="48" style="border:1px solid #ccc;width:96px;height:96px"></canvas>
  </div>
  <div>
    <p>icon-128.png</p>
    <canvas id="c128" width="128" height="128" style="border:1px solid #ccc"></canvas>
  </div>
</div>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');

  // Background rounded rect
  const r = s * 0.18;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();

  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#1e3a5f');
  grad.addColorStop(1, '#0f172a');
  ctx.fillStyle = grad;
  ctx.fill();

  // Three kanban columns
  const colW = s * 0.2;
  const colGap = s * 0.06;
  const colH = s * 0.55;
  const startX = s * 0.15;
  const startY = s * 0.28;
  const colors = ['#6366f1', '#f59e0b', '#10b981'];
  const cardCounts = [2, 3, 1];

  colors.forEach((col, i) => {
    const x = startX + i * (colW + colGap);

    // Column background
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    const cr = s * 0.03;
    ctx.beginPath();
    ctx.moveTo(x + cr, startY);
    ctx.lineTo(x + colW - cr, startY);
    ctx.quadraticCurveTo(x + colW, startY, x + colW, startY + cr);
    ctx.lineTo(x + colW, startY + colH - cr);
    ctx.quadraticCurveTo(x + colW, startY + colH, x + colW - cr, startY + colH);
    ctx.lineTo(x + cr, startY + colH);
    ctx.quadraticCurveTo(x, startY + colH, x, startY + colH - cr);
    ctx.lineTo(x, startY + cr);
    ctx.quadraticCurveTo(x, startY, x + cr, startY);
    ctx.fill();

    // Cards
    const cardH = s * 0.1;
    const cardGap = s * 0.04;
    const cardPad = s * 0.025;
    for (let j = 0; j < cardCounts[i]; j++) {
      const cy = startY + cardPad + j * (cardH + cardGap);
      ctx.fillStyle = col;
      ctx.globalAlpha = 0.85;
      const ccr = s * 0.02;
      ctx.beginPath();
      ctx.moveTo(x + cardPad + ccr, cy);
      ctx.lineTo(x + colW - cardPad - ccr, cy);
      ctx.quadraticCurveTo(x + colW - cardPad, cy, x + colW - cardPad, cy + ccr);
      ctx.lineTo(x + colW - cardPad, cy + cardH - ccr);
      ctx.quadraticCurveTo(x + colW - cardPad, cy + cardH, x + colW - cardPad - ccr, cy + cardH);
      ctx.lineTo(x + cardPad + ccr, cy + cardH);
      ctx.quadraticCurveTo(x + cardPad, cy + cardH, x + cardPad, cy + cardH - ccr);
      ctx.lineTo(x + cardPad, cy + ccr);
      ctx.quadraticCurveTo(x + cardPad, cy, x + cardPad + ccr, cy);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  });

  // "KM" text at top
  if (s >= 48) {
    ctx.fillStyle = '#e2e8f0';
    ctx.font = `bold ${s * 0.14}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('KM', s / 2, s * 0.2);
  }
}

drawIcon(document.getElementById('c16'));
drawIcon(document.getElementById('c48'));
drawIcon(document.getElementById('c128'));
</script>
</body>
</html>
