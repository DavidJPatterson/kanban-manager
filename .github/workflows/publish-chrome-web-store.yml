name: Publish to Chrome Web Store

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extension version: $VERSION"

      - name: Package extension
        run: |
          zip -r kanban-manager.zip \
            manifest.json \
            background.js \
            shared.js \
            popup.html \
            popup.js \
            board.html \
            board.js \
            options.html \
            options.js \
            icons/icon-16.png \
            icons/icon-48.png \
            icons/icon-128.png
          echo "Package size: $(du -h kanban-manager.zip | cut -f1)"

      - name: Upload zip as release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" kanban-manager.zip --clobber

      - name: Get access token from refresh token
        id: token
        env:
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          RESPONSE=$(curl -s -X POST "https://oauth2.googleapis.com/token" \
            -d "client_id=$CLIENT_ID" \
            -d "client_secret=$CLIENT_SECRET" \
            -d "refresh_token=$REFRESH_TOKEN" \
            -d "grant_type=refresh_token")
          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to get access token:"
            echo "$RESPONSE" | jq .
            exit 1
          fi
          echo "::add-mask::$ACCESS_TOKEN"
          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Upload to Chrome Web Store
        env:
          ACCESS_TOKEN: ${{ steps.token.outputs.access_token }}
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -T kanban-manager.zip \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/$EXTENSION_ID")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Upload response ($HTTP_CODE):"
          echo "$BODY" | jq .
          STATUS=$(echo "$BODY" | jq -r '.uploadState')
          if [ "$STATUS" != "SUCCESS" ]; then
            echo "Upload failed with status: $STATUS"
            exit 1
          fi

      - name: Publish extension
        env:
          ACCESS_TOKEN: ${{ steps.token.outputs.access_token }}
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/$EXTENSION_ID/publish")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Publish response ($HTTP_CODE):"
          echo "$BODY" | jq .
          STATUS=$(echo "$BODY" | jq -r '.status[0]')
          if [ "$STATUS" != "OK" ] && [ "$STATUS" != "PUBLISHED_WITH_FRICTION_WARNING" ]; then
            echo "Publish failed with status: $STATUS"
            exit 1
          fi
          echo "Successfully published v${{ steps.version.outputs.version }} to Chrome Web Store!"
