<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kanban Manager — Team</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
    --text: #f1f5f9; --muted: #94a3b8; --border: #334155;
    --input-bg: #0f172a; --accent: #1d4ed8; --accent-hover: #2563eb;
  }
  [data-theme="light"] {
    --bg: #f1f5f9; --surface: #ffffff; --surface2: #e2e8f0;
    --text: #0f172a; --muted: #64748b; --border: #cbd5e1;
    --input-bg: #f8fafc; --accent: #2563eb; --accent-hover: #3b82f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: flex-start;
    justify-content: center; padding: 2rem 1rem;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 2rem; width: 100%; max-width: 960px;
  }
  .header-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 1.5rem;
  }
  h1 { font-size: 1.25rem; margin-bottom: 0.25rem; }
  .sub { font-size: 0.875rem; color: var(--muted); }
  .header-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
  .btn-secondary {
    background: var(--surface2); color: var(--muted); border: none; border-radius: 8px;
    padding: 0.45rem 0.8rem; font-size: 0.85rem; cursor: pointer;
  }
  .btn-secondary:hover { background: var(--border); color: var(--text); }

  /* Pod sections */
  .pod-section { margin-bottom: 1rem; }
  .pod-section-header {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.65rem 0.85rem; background: var(--surface2); border-radius: 8px;
    cursor: pointer; user-select: none; border-left: 3px solid var(--border);
  }
  .pod-section-header:hover { background: var(--border); }
  .pod-section-name { font-weight: 600; font-size: 0.9rem; flex: 1; }
  .pod-section-count { font-size: 0.75rem; color: var(--muted); }
  .pod-section-toggle { font-size: 0.7rem; color: var(--muted); transition: transform 0.15s; }
  .pod-section-toggle.collapsed { transform: rotate(-90deg); }
  .pod-section-body { padding: 0.5rem 0; }
  .pod-section-body.collapsed { display: none; }

  .sync-btn {
    background: rgba(59,130,246,.1); color: #60a5fa; border: 1px solid rgba(59,130,246,.2);
    border-radius: 6px; padding: 0.3rem 0.7rem; font-size: 0.7rem; cursor: pointer;
  }
  .sync-btn:hover { background: rgba(59,130,246,.2); }
  .sync-btn:disabled { opacity: 0.5; cursor: default; }

  /* Member rows */
  .member-list { display: flex; flex-direction: column; gap: 0.4rem; }
  .member-row {
    display: flex; align-items: center; gap: 0.6rem;
    background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.5rem 0.75rem; flex-wrap: wrap;
  }
  .member-avatar {
    width: 28px; height: 28px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 0.6rem;
    font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .member-name { font-size: 0.85rem; flex: 1; min-width: 120px; }
  .holiday-toggle {
    display: flex; align-items: center; gap: 0.35rem; font-size: 0.75rem;
    color: var(--muted); cursor: pointer;
  }
  .holiday-toggle input { width: auto; margin: 0; }

  /* Holiday dates */
  .holiday-dates {
    width: 100%; padding-left: 2.5rem; margin-top: 0.25rem;
    display: flex; flex-direction: column; gap: 0.3rem;
  }
  .holiday-date-row {
    display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem;
  }
  .holiday-date-row input[type="date"] {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 0.25rem 0.5rem; font-size: 0.75rem; font-family: inherit;
  }
  .holiday-date-row input[type="date"]:focus { border-color: #3b82f6; outline: none; }
  .holiday-remove-btn {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 0.85rem; padding: 0.1rem 0.3rem; border-radius: 4px;
  }
  .holiday-remove-btn:hover { color: #ef4444; background: rgba(239,68,68,.1); }
  .holiday-add-btn {
    background: none; border: 1px dashed rgba(59,130,246,.3); color: #60a5fa;
    border-radius: 6px; padding: 0.2rem 0.6rem; font-size: 0.7rem; cursor: pointer;
    align-self: flex-start;
  }
  .holiday-add-btn:hover { background: rgba(59,130,246,.1); }

  .pod-pause-row {
    display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    padding: 0.5rem 0.75rem; margin-bottom: 0.5rem;
    background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px;
  }
  .pause-toggle { display: flex; align-items: center; gap: 0.35rem; font-size: 0.85rem; cursor: pointer; }
  .pause-toggle input { width: auto; margin: 0; }
  .pause-dates { display: flex; align-items: center; gap: 0.4rem; }
  .pause-resume-input {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 0.25rem 0.5rem; font-size: 0.75rem; font-family: inherit;
  }
  .pause-resume-input:focus { border-color: #3b82f6; outline: none; }

  .empty-msg { font-size: 0.8rem; color: var(--muted); padding: 0.75rem; text-align: center; }
  .status { font-size: 0.8rem; color: var(--muted); margin-top: 0.5rem; min-height: 1.2em; }
  .status.ok { color: #22c55e; }
  .status.err { color: #ef4444; }
</style>
</head>
<body>
<div class="card">
  <div class="header-row">
    <div>
      <h1>👥 Team Management</h1>
      <p class="sub">Manage team members and holiday schedules per pod.</p>
    </div>
    <div class="header-actions">
      <button class="sync-btn" id="sync-all-btn" style="font-size:.8rem;padding:.4rem .8rem">↻ Sync All Pods</button>
      <button class="btn-secondary" id="export-holidays-btn" title="Download holidays as JSON" style="font-size:.8rem;padding:.4rem .7rem">⤓ Export</button>
      <button class="btn-secondary" id="import-holidays-btn" title="Replace holidays from a JSON file" style="font-size:.8rem;padding:.4rem .7rem">⤒ Import</button>
      <button class="btn-secondary" id="theme-btn" title="Toggle light/dark mode">☀</button>
      <button class="btn-secondary" id="back-btn">← Board</button>
    </div>
  </div>
  <div id="pods-container"></div>
  <div id="status" class="status"></div>
</div>
<script src="shared.js"></script>
<script src="team.js"></script>
</body>
</html>
